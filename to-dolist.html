<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker Deluxe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🌟 Task Tracker Deluxe</h1>
  <ul class="todo-list">
    <li>
      <input type="checkbox" id="task1">
      <label for="task1">Finish HTML Lab</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://developer.mozilla.org/en-US/docs/Web/HTML" target="_blank">HTML Docs</a></li>
      </ul>
    </li>
    <li>
      <input type="checkbox" id="task2">
      <label for="task2">Style with CSS</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://css-tricks.com/" target="_blank">CSS Tricks</a></li>
      </ul>
    </li>
    <li>
      <input type="checkbox" id="task3">
      <label for="task3">Explore Accessibility</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://webaim.org/" target="_blank">WebAIM</a></li>
      </ul>
    </li>
    <li>
      <input type="checkbox" id="task4">
      <label for="task4">Celebrate Progress 🎉</label>
      <ul class="sub-item">
        <li><a class="sub-item-link" href="https://freecodecamp.org" target="_blank">freeCodeCamp</a></li>
      </ul>
    </li>
  </ul>
</body>
</html>
